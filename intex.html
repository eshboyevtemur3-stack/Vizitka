<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta Dilmurod - Raqamli Vizitka</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }
        body {
            background-color: #f4f6f9;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
            padding: 20px; 
            color: #333;
        }
        .container { 
            max-width: 400px; 
            width: 100%; 
            text-align: center; 
            background: #ffffff;
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .avatar-area {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 36px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        h1 { 
            font-size: 24px; 
            color: #1f2937; 
            margin-bottom: 8px; 
            font-weight: 700;
        }
        p { 
            font-size: 15px; 
            color: #4b5563; 
            margin-bottom: 35px; 
            line-height: 1.5;
        }
        .link-btn {
            display: block; 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 16px;
            color: white; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 16px;
            border-radius: 14px;
            transition: transform 0.2s, cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .link-btn:active {
            transform: scale(0.98);
        }
        /* Telegram tugmasi */
        .tg-btn {
            background: #24A1DE;
            box-shadow: 0 4px 12px rgba(36, 161, 222, 0.3);
        }
        /* Telefon tugmasi */
        .phone-btn {
            background: #34C759;
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3);
            margin-bottom: 0;
        }
        footer { 
            margin-top: 40px; 
            font-size: 12px; 
            color: #9ca3af; 
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Profil belgisi -->
    <div class="avatar-area">🛠️</div>

    <!-- Sarlavha va qisqa matn -->
    <h1>Usta Dilmurod</h1>
    <p>Xizmatlar bo'yicha bog'lanish yoki buyurtma berish uchun quyidagi tugmalardan foydalaning:</p>

    <!-- Aloqa tugmalari -->
    <a href="https://t.me/dilmurod_usta1626" target="_blank" class="link-btn tg-btn">Telegram'da yozish</a>
    <a href="tel:+998901311626" class="link-btn phone-btn">Qo'ng'iroq qilish</a>

    <footer>© 2026 Usta Dilmurod.</footer>
</div>

</body>
</html>
